<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暈眩健康紀錄</title>
    
    <!-- APP 相關設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="暈眩紀錄">
    <meta name="theme-color" content="#064e3b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 手動配置區 ---
        // 請將您的 Firebase 金鑰貼在下方括號內
        const manualFirebaseConfig = null; 

        let firebaseConfig;
        try {
            firebaseConfig = manualFirebaseConfig || (typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null);
        } catch (e) {
            firebaseConfig = null;
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dizziness-tracker-pwa';

        window.trackerApp = {
            db: JSON.parse(localStorage.getItem('dizziness_local_backup')) || [],
            user: null,
            myChart: null,
            levelDescriptions: {
                0: "0級：完全沒事，頭腦很清爽。",
                1: "1級：有一點點飄飄的，不影響生活。",
                2: "2級：輕微頭重腳輕，還可以走路。",
                3: "3級：明顯感覺暈，走路要慢慢走。",
                4: "4級：開始天旋地轉，需要坐下來休息。",
                5: "5級：走路不穩，身體會晃，不能開車。",
                6: "6級：一定要扶著牆壁走，看東西會想吐。",
                7: "7級：完全站不穩，必須立刻躺下休息。",
                8: "8級：躺著也覺得天旋地轉，非常難受。",
                9: "9級：嚴重嘔吐，沒辦法吃東西，很不舒服。",
                10: "10級：最嚴重的痛苦，請立即由家人陪同就醫。"
            }
        };

        // --- 初始化 APP ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('date').valueAsDate = new Date();
            updateUI();
            checkPWA();
        });

        if (firebaseConfig && firebaseConfig.apiKey) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const firestore = getFirestore(app);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.trackerApp.user = user;
                    document.getElementById('syncStatus').innerText = "🌿 雲端守護中";
                    const userDocRef = doc(firestore, 'artifacts', appId, 'users', user.uid, 'settings', 'data');
                    onSnapshot(userDocRef, (docSnap) => {
                        if (docSnap.exists()) {
                            window.trackerApp.db = docSnap.data().records || [];
                            updateUI();
                        }
                    });
                }
            });
            signInAnonymously(auth);
            window.firestoreDB = firestore;
        } else {
            document.getElementById('syncStatus').innerText = "📍 本地模式 (無備份)";
        }

        // --- 功能函式 ---
        window.saveRecord = async () => {
            const getChecked = (name) => Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(i => i.value);
            const newEntry = {
                id: Date.now(),
                date: document.getElementById('date').value,
                sleep: parseFloat(document.getElementById('sleep').value) || 0,
                nap: parseInt(document.getElementById('nap').value) || 0,
                level: parseInt(document.getElementById('level').value),
                occurTimes: getChecked('occurTime'),
                symptoms: getChecked('symptoms'),
                symptomOtherText: document.getElementById('symptomOtherText').value,
                dietPrecautions: getChecked('dietPrecautions'),
                dietOtherText: document.getElementById('dietOtherText').value,
                normalMeals: getChecked('normalMeals')
            };
            window.trackerApp.db.push(newEntry);
            window.trackerApp.db.sort((a, b) => new Date(a.date) - new Date(b.date));
            updateUI();
            await syncToCloud();
            
            // 重置
            document.getElementById('recordForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('symptomOtherContainer').classList.add('hidden');
            document.getElementById('dietOtherContainer').classList.add('hidden');
            window.updateLevelHint(0);
            alert("✅ 紀錄成功！");
        };

        const syncToCloud = async () => {
            localStorage.setItem('dizziness_local_backup', JSON.stringify(window.trackerApp.db));
            if (!window.trackerApp.user || !window.firestoreDB) return;
            const userDocRef = doc(window.firestoreDB, 'artifacts', appId, 'users', window.trackerApp.user.uid, 'settings', 'data');
            await setDoc(userDocRef, { records: window.trackerApp.db });
            document.getElementById('syncIndicator').classList.remove('hidden');
            setTimeout(() => document.getElementById('syncIndicator').classList.add('hidden'), 2000);
        };

        function updateUI() {
            renderTable();
            renderChart();
            const db = window.trackerApp.db;
            const total = db.length;
            document.getElementById('avgDizziness').innerText = total ? (db.reduce((a, c) => a + c.level, 0) / total).toFixed(1) : "0.0";
            document.getElementById('avgSleep').innerText = total ? (db.reduce((a, c) => a + c.sleep, 0) / total).toFixed(1) : "0.0";
            document.getElementById('totalRecords').innerText = total;
        }

        const renderTable = () => {
            const list = document.getElementById('recordList');
            const db = window.trackerApp.db;
            list.innerHTML = db.length ? '' : '<tr><td colspan="5" class="p-10 text-center text-stone-400 text-xl italic">目前還沒有紀錄</td></tr>';
            [...db].reverse().forEach(item => {
                const color = item.level >= 8 ? 'text-orange-900' : (item.level >= 4 ? 'text-orange-700' : 'text-emerald-800');
                let s = (item.symptoms || []).map(v => v === '其他' ? `其他(${item.symptomOtherText || ''})` : v).join(', ');
                
                let dietList = [...(item.normalMeals || []), ...(item.dietPrecautions || [])];
                let dietFinal = dietList.map(v => v === '其他' ? `其他(${item.dietOtherText || ''})` : v).join(', ');

                list.innerHTML += `
                    <tr class="border-b border-stone-100">
                        <td class="p-4"><div class="font-bold text-lg text-emerald-900">${item.date}</div></td>
                        <td class="p-4 text-center"><span class="font-black text-3xl ${color}">${item.level}</span></td>
                        <td class="p-4 text-base text-emerald-800">💤 ${item.sleep}h / 🛌 ${item.nap}m</td>
                        <td class="p-4 text-base"><b>不舒服：</b>${s || '無'}<br><span class="text-stone-500 text-sm italic">飲食：${dietFinal || '-'}</span></td>
                        <td class="p-4 text-right"><button onclick="deleteRecord(${item.id})" class="text-stone-300 text-2xl">✕</button></td>
                    </tr>`;
            });
        };

        const renderChart = () => {
            const ctx = document.getElementById('healthChart').getContext('2d');
            const db = window.trackerApp.db;
            if (window.trackerApp.myChart) window.trackerApp.myChart.destroy();
            window.trackerApp.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: db.map(i => i.date),
                    datasets: [
                        { label: '暈眩級別', data: db.map(i => i.level), borderColor: '#064e3b', borderWidth: 4, tension: 0.3, yAxisID: 'y' },
                        { label: '睡眠(h)', data: db.map(i => i.sleep), borderColor: '#84cc16', borderDash: [5,5], tension: 0.3, yAxisID: 'y1' }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { min: 0, max: 10 }, y1: { position: 'right', min: 0, max: 15 } }
                }
            });
        };

        window.updateLevelHint = (val) => {
            document.getElementById('levelVal').innerText = val;
            document.getElementById('levelHint').innerText = window.trackerApp.levelDescriptions[val];
        };

        window.toggleOtherInput = (id, cb) => {
            document.getElementById(id).classList.toggle('hidden', !cb.checked);
        };

        window.deleteRecord = async (id) => {
            if (confirm("要刪除嗎？")) {
                window.trackerApp.db = window.trackerApp.db.filter(i => i.id !== id);
                updateUI(); await syncToCloud();
            }
        };

        window.exportCSV = () => {
            const db = window.trackerApp.db;
            if (db.length === 0) return alert("還沒有紀錄喔！");
            let csv = "\uFEFF日期,睡眠時數(h),午睡(m),暈眩程度,不舒服症狀,飲食備註\n";
            db.forEach(row => {
                let s = (row.symptoms || []).map(v => v === '其他' ? `其他(${row.symptomOtherText || ''})` : v).join('|');
                let d = [...(row.normalMeals || []), ...(row.dietPrecautions || [])].map(v => v === '其他' ? `其他(${row.dietOtherText || ''})` : v).join('|');
                csv += `${row.date},${row.sleep},${row.nap},${row.level},"${s}","${d}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `暈眩健康紀錄_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        };

        function checkPWA() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (!isStandalone) {
                document.getElementById('pwaGuide').classList.remove('hidden');
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcfaf2; color: #1a2e1a; -webkit-tap-highlight-color: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 40px; width: 40px; border-radius: 50%;
            background: #064e3b; cursor: pointer; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-top: -14px;
        }
        input[type=range]::-webkit-slider-runnable-track { height: 14px; background: #d1d5db; border-radius: 7px; }
        .checkbox-group input:checked + span { background-color: #064e3b; border-color: #064e3b; color: white; }
        .checkbox-group span { padding: 15px; font-size: 1.2rem; font-weight: 700; border-radius: 1rem; display: block; text-align: center; border: 2px solid #e5e7eb; transition: 0.2s; background: #fff; }
        .earth-card { background: #ffffff; border-radius: 2.5rem; border: 1px solid #e5e7eb; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="pb-10">
    <!-- APP 指引 -->
    <div id="pwaGuide" class="hidden bg-emerald-900 text-white p-4 text-center text-lg font-bold flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <span>📱 點擊瀏覽器選單「新增至主畫面」可安裝成 APP</span>
        <button onclick="this.parentElement.remove()" class="bg-emerald-700 px-3 py-1 rounded-lg">✕</button>
    </div>

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="mb-6 bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-emerald-900 leading-tight">🌿 暈眩健康紀錄</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="syncIndicator" class="hidden w-3 h-3 bg-lime-500 rounded-full animate-ping"></span>
                    <p id="syncStatus" class="text-emerald-700/50 text-sm font-bold italic font-medium">連線中...</p>
                </div>
            </div>
            <button onclick="window.exportCSV()" class="text-3xl">📥</button>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-emerald-800 text-white p-5 rounded-[2.5rem] text-center shadow-md">
                <div class="text-base font-bold opacity-80 mb-1">平均暈眩</div>
                <div class="text-5xl font-black" id="avgDizziness">0.0</div>
            </div>
            <div class="bg-lime-600 text-white p-5 rounded-[2.5rem] text-center shadow-md">
                <div class="text-base font-bold opacity-80 mb-1">平均睡眠</div>
                <div class="text-5xl font-black" id="avgSleep">0.0</div>
            </div>
            <div class="bg-stone-800 text-white p-5 rounded-[2.5rem] text-center shadow-md">
                <div class="text-base font-bold opacity-80 mb-1">總紀錄</div>
                <div class="text-5xl font-black" id="totalRecords">0</div>
            </div>
        </div>

        <div class="space-y-6">
            <!-- Form -->
            <div class="earth-card p-6 md:p-10 shadow-lg">
                <h2 class="text-2xl font-black mb-6 text-emerald-900 flex items-center gap-2">✍️ 填寫紀錄</h2>
                <form id="recordForm" class="space-y-8">
                    <div>
                        <label class="block font-bold text-emerald-800 mb-2">1. 日期</label>
                        <input type="date" id="date" required class="w-full p-4 text-xl border-2 border-stone-100 rounded-2xl bg-stone-50 outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block font-bold text-emerald-800 mb-2">2. 睡眠(h)</label>
                            <input type="number" id="sleep" step="0.5" placeholder="7.5" class="w-full p-4 text-xl border-2 border-stone-100 rounded-2xl bg-stone-50 outline-none">
                        </div>
                        <div>
                            <label class="block font-bold text-emerald-800 mb-2">3. 午睡(m)</label>
                            <input type="number" id="nap" placeholder="30" class="w-full p-4 text-xl border-2 border-stone-100 rounded-2xl bg-stone-50 outline-none">
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-3">
                            <label class="font-bold text-emerald-800 text-xl">4. 暈眩程度</label>
                            <span class="text-3xl font-black text-emerald-900"><span id="levelVal">0</span> 級</span>
                        </div>
                        <input type="range" id="level" min="0" max="10" value="0" class="w-full mb-4 appearance-none" oninput="updateLevelHint(this.value)">
                        <div id="levelHint" class="p-5 bg-emerald-800 text-white text-lg rounded-2xl font-bold text-center leading-snug">0級：完全沒事，頭腦很清爽。</div>
                    </div>

                    <div>
                        <label class="block font-bold text-emerald-800 mb-4">5. 有什麼不舒服？</label>
                        <div class="grid grid-cols-2 gap-3 checkbox-group">
                            <label><input type="checkbox" name="symptoms" value="耳鳴" class="sr-only"><span>耳鳴</span></label>
                            <label><input type="checkbox" name="symptoms" value="頭重" class="sr-only"><span>頭重</span></label>
                            <label><input type="checkbox" name="symptoms" value="想吐" class="sr-only"><span>想吐</span></label>
                            <label><input type="checkbox" name="symptoms" value="不穩" class="sr-only"><span>不穩</span></label>
                            <label><input type="checkbox" name="symptoms" value="聽力變化" class="sr-only"><span>聽力變化</span></label>
                            <label><input type="checkbox" name="symptoms" value="其他" class="sr-only" onchange="toggleOtherInput('symptomOtherContainer', this)"><span>其他描述</span></label>
                        </div>
                        <div id="symptomOtherContainer" class="mt-3 hidden">
                            <textarea id="symptomOtherText" placeholder="請詳細說明症狀..." class="w-full p-4 border-2 border-emerald-50 rounded-2xl bg-emerald-50/30 h-20 outline-none"></textarea>
                        </div>
                    </div>

                    <div>
                        <label class="block font-bold text-emerald-800 mb-4">6. 飲食與餐食</label>
                        <div class="grid grid-cols-2 gap-3 checkbox-group">
                            <label><input type="checkbox" name="normalMeals" value="早餐" class="sr-only"><span>早餐</span></label>
                            <label><input type="checkbox" name="normalMeals" value="午餐" class="sr-only"><span>午餐</span></label>
                            <label><input type="checkbox" name="normalMeals" value="晚餐" class="sr-only"><span>晚餐</span></label>
                            <label><input type="checkbox" name="dietPrecautions" value="咖啡因" class="sr-only"><span>咖啡因</span></label>
                            <label><input type="checkbox" name="normalMeals" value="點心" class="sr-only"><span>點心</span></label>
                            <label><input type="checkbox" name="dietPrecautions" value="太鹹/太甜/太油" class="sr-only"><span>太鹹/太甜/太油</span></label>
                            <label class="col-span-2"><input type="checkbox" name="dietPrecautions" value="其他" class="sr-only" onchange="toggleOtherInput('dietOtherContainer', this)"><span>其他 (可填寫)</span></label>
                        </div>
                        <div id="dietOtherContainer" class="mt-3 hidden">
                            <textarea id="dietOtherText" placeholder="請填寫具體飲食紀錄..." class="w-full p-4 border-2 border-emerald-50 rounded-2xl bg-emerald-50/30 h-20 outline-none"></textarea>
                        </div>
                    </div>

                    <button type="button" onclick="saveRecord()" class="w-full bg-emerald-900 text-white font-black text-2xl py-6 rounded-[2rem] shadow-xl active:scale-95 transition">儲存並同步</button>
                </form>
            </div>

            <!-- Chart -->
            <div class="earth-card p-6 shadow-md">
                <h3 class="text-xl font-bold mb-4 text-emerald-900">📈 狀況走勢</h3>
                <div class="h-64"><canvas id="healthChart"></canvas></div>
            </div>

            <!-- List -->
            <div class="earth-card overflow-hidden shadow-md">
                <div class="p-5 bg-stone-50 border-b border-stone-100 font-bold">🗂 歷史紀錄</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <tbody id="recordList" class="divide-y divide-stone-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div class="safe-area-bottom"></div>
</body>
</html>
